<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kumsal Restaurant — Menü QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Outfit:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: "Outfit", sans-serif;
      background: #0c0e12;
      color: #f2f0eb;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 360px;
      padding: 2rem 1.75rem;
      background: #141820;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-style: italic;
      font-weight: 400;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #e8b84a;
      margin-bottom: 1.5rem;
    }

    .qr-wrap {
      background: #fff;
      padding: 1rem;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 1.25rem;
    }

    .qr-wrap img {
      display: block;
      width: 220px;
      height: 220px;
    }

    .hint {
      font-size: 0.95rem;
      color: #9aa3b2;
      margin-bottom: 0.75rem;
    }

    .url {
      font-size: 0.75rem;
      word-break: break-all;
      color: #4a9fd4;
    }

    .print-btn {
      margin-top: 1.5rem;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.6rem 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      background: transparent;
      color: #f2f0eb;
      cursor: pointer;
    }

    .print-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    @media print {
      body {
        background: #fff;
        color: #000;
        padding: 0;
      }

      .card {
        border: none;
        background: #fff;
        box-shadow: none;
      }

      .print-btn { display: none; }
      .hint, .url { color: #333; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kumsal Restaurant</h1>
    <p class="subtitle">Güncel Fiyat Listesi</p>
    <div class="qr-wrap">
      <img src="menu-qr.png" alt="Menü fiyat listesi QR kodu" width="220" height="220" />
    </div>
    <p class="hint">Kameranızla okutun, fiyat listesine ulaşın.</p>
    <p class="url">suleymanngulter.github.io/menu-kumsal</p>
    <button class="print-btn" onclick="window.print()">Yazdır</button>
  </div>
</body>
</html>
